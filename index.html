<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Ledger V2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e; --surface: #141715; --surface2: #1b1e1c; --border: #242724;
    --accent: #b4f068; --accent-dim: #7aad38; --red: #f06868; --red-dim: #a03838;
    --blue: #68b4f0; --blue-dim: #387aad; --text: #e8ede9; --text-muted: #6b7a6d; --text-dim: #3d4a3f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 0 0 80px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.5; }
  header { border-bottom: 1px solid var(--border); padding: 28px 32px 24px; display: flex; align-items: baseline; gap: 16px; position: sticky; top: 0; background: rgba(13, 15, 14, 0.92); backdrop-filter: blur(12px); z-index: 10; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .header-tag { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-left: auto; }
  .main { max-width: 800px; margin: 0 auto; padding: 40px 24px 0; }
  
  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card.neutral::before { background: var(--blue); }
  .card.green::before { background: var(--accent); }
  .card.red::before { background: var(--red); }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .card-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .card-value.green { color: var(--accent); }
  .card-value.red { color: var(--red); }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 40px; display: grid; grid-template-columns: 1fr 2fr auto; gap: 12px; align-items: end; }
  .field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent-dim); }
  .btn { background: var(--accent); color: #0d0f0e; border: none; border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; padding: 11px 24px; cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; align-self: end; }
  .btn:hover { background: #c8ff7a; }
  .btn:active { transform: scale(0.98); }
  .btn.danger { background: transparent; color: var(--red); border: 1px solid var(--red-dim); padding: 6px 12px; font-size: 11px; }

  .ledger { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ledger-head { display: grid; grid-template-columns: 90px 1fr 100px 110px 110px 60px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .ledger-head span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .ledger-row { display: grid; grid-template-columns: 90px 1fr 100px 110px 110px 60px; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; }
  .ledger-row:hover { background: var(--surface2); }
  .row-date { color: var(--text-muted); font-size: 12px; }
  .row-note { font-size: 13px; color: var(--text); }
  .row-tag { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 4px; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
  
  .tag-cap-in { background: rgba(104, 180, 240, 0.12); color: var(--blue); }
  .tag-cap-out { background: rgba(107, 122, 109, 0.2); color: var(--text-muted); }
  .tag-profit { background: rgba(180, 240, 104, 0.12); color: var(--accent); }
  .tag-loss { background: rgba(240, 104, 104, 0.12); color: var(--red); }

  .row-amount { font-size: 14px; }
  .row-amount.pos { color: var(--accent); }
  .row-amount.neg { color: var(--red); }
  .row-amount.neu { color: var(--blue); }
  
  .row-running { font-size: 14px; color: var(--text); font-weight: 500; }
  .row-pnl { font-size: 12px; }
  .row-pnl.pos { color: var(--accent); }
  .row-pnl.neg { color: var(--red); }
  .row-pnl.neu { color: var(--text-muted); }

  .pnl-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 40px; }
  .pnl-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .pnl-bar-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .pnl-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
  .pnl-bar-fill.pos { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); }
  .pnl-bar-fill.neg { background: linear-gradient(90deg, var(--red-dim), var(--red)); }
</style>
</head>
<body>

<header>
  <div class="logo">LEDGER<span>.io</span></div>
  <div class="header-tag">Portfolio Engine</div>
</header>

<div class="main">

  <div class="summary">
    <div class="card neutral">
      <div class="card-label">Total Capital Invested</div>
      <div class="card-value" id="s-capital">₹0.00</div>
      <div class="card-sub">Your out-of-pocket money</div>
    </div>
    <div class="card neutral">
      <div class="card-label">Current Balance</div>
      <div class="card-value" id="s-current">₹0.00</div>
      <div class="card-sub">Capital + Trading P&L</div>
    </div>
    <div class="card neutral">
      <div class="card-label">Net P&amp;L</div>
      <div class="card-value" id="s-pnl">₹0.00</div>
      <div class="card-sub" id="s-pnl-pct">0.00% all time</div>
    </div>
  </div>

  <div class="pnl-bar-wrap">
    <div class="pnl-bar-label">
      <span>Overall ROI</span>
      <span id="bar-label">—</span>
    </div>
    <div class="pnl-bar-track">
      <div class="pnl-bar-fill pos" id="pnl-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title">Log Action</div>
  <div class="add-form">
    <div class="field">
      <label>Action Type</label>
      <select id="entry-type">
        <optgroup label="Capital Flow (Doesn't affect P&L)">
          <option value="cap_in">Add Funds (Deposit)</option>
          <option value="cap_out">Withdraw Funds</option>
        </optgroup>
        <optgroup label="Trading Results (Changes P&L)">
          <option value="trade_profit">Booked Profit</option>
          <option value="trade_loss">Booked Loss</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Note / Asset</label>
      <input type="text" id="entry-note" placeholder="e.g. Added funds, Sold TCS...">
    </div>
    <div class="field">
      <label>Amount (₹)</label>
      <input type="number" id="entry-amount" placeholder="0.00" min="0" step="0.01">
    </div>
    <button class="btn" onclick="addEntry()">+ Log</button>
  </div>

  <div class="section-title">Ledger</div>
  <div class="ledger">
    <div class="ledger-head">
      <span>Date</span>
      <span>Details</span>
      <span>Amount</span>
      <span>Balance</span>
      <span>Total P&L</span>
      <span></span>
    </div>
    <div class="ledger-body" id="ledger-body"></div>
  </div>

</div>

<script>
  // Fresh storage key for the new engine
  const STORAGE_KEY = 'stock_ledger_v3';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } 
    catch { return null; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function initData() {
    const existing = loadData();
    if (existing) return existing;

    const data = [
      { id: Date.now() - 2000, date: '2026-04-01', note: 'Initial Seed Capital', type: 'cap_in', amount: 11500 },
      { id: Date.now() - 1000, date: new Date().toISOString().split('T')[0], note: 'Trading losses', type: 'trade_loss', amount: 1500 }
    ];
    saveData(data);
    return data;
  }

  let entries = initData();

  function fmt(n) { return '₹' + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 2 }); }
  function fmtSigned(n) { return (n > 0 ? '+' : (n < 0 ? '-' : '')) + fmt(n); }

  // Engine recalculates the state of Capital and P&L line-by-line
  function calcLedger() {
    let cap = 0; // Out of pocket invested capital
    let bal = 0; // Total current balance

    return entries.map(e => {
      if (e.type === 'cap_in') { cap += e.amount; bal += e.amount; }
      else if (e.type === 'cap_out') { cap -= e.amount; bal -= e.amount; }
      else if (e.type === 'trade_profit') { bal += e.amount; }
      else if (e.type === 'trade_loss') { bal -= e.amount; }
      
      const currentPnl = bal - cap;
      return { ...e, cap, bal, currentPnl };
    });
  }

  function render() {
    const rows = calcLedger();
    const latest = rows.length ? rows[rows.length - 1] : { cap: 0, bal: 0, currentPnl: 0 };
    
    const pct = latest.cap > 0 ? (latest.currentPnl / latest.cap * 100) : 0;

    // Update Cards
    document.getElementById('s-capital').textContent = fmt(latest.cap);
    document.getElementById('s-current').textContent = fmt(latest.bal);
    
    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = fmtSigned(latest.currentPnl);
    pnlEl.className = 'card-value ' + (latest.currentPnl > 0 ? 'green' : (latest.currentPnl < 0 ? 'red' : ''));
    document.getElementById('s-pnl-pct').textContent = fmtSigned(pct).replace('₹', '') + '% overall';

    // Update Bar
    const barPct = Math.min(Math.abs(pct), 100);
    const bar = document.getElementById('pnl-bar');
    bar.style.width = Math.max(barPct, 1) + '%';
    bar.className = 'pnl-bar-fill ' + (latest.currentPnl >= 0 ? 'pos' : 'neg');
    document.getElementById('bar-label').textContent = (latest.currentPnl >= 0 ? '▲ ' : '▼ ') + Math.abs(pct).toFixed(2) + '%';

    // Update Table
    const body = document.getElementById('ledger-body');
    body.innerHTML = rows.slice().reverse().map(r => {
      let tagClass, tagLabel, amtClass, amtSign;
      
      if (r.type === 'cap_in') { tagClass = 'tag-cap-in'; tagLabel = 'FUNDED'; amtClass = 'neu'; amtSign = '+'; }
      else if (r.type === 'cap_out') { tagClass = 'tag-cap-out'; tagLabel = 'WITHDRAWN'; amtClass = 'neu'; amtSign = '-'; }
      else if (r.type === 'trade_profit') { tagClass = 'tag-profit'; tagLabel = 'PROFIT'; amtClass = 'pos'; amtSign = '+'; }
      else if (r.type === 'trade_loss') { tagClass = 'tag-loss'; tagLabel = 'LOSS'; amtClass = 'neg'; amtSign = '-'; }

      const pnlClass = r.currentPnl > 0 ? 'pos' : (r.currentPnl < 0 ? 'neg' : 'neu');

      return `
        <div class="ledger-row">
          <div class="row-date">${r.date}</div>
          <div>
            <div class="row-note">${r.note}</div>
            <span class="row-tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="row-amount ${amtClass}">${amtSign}${fmt(r.amount)}</div>
          <div class="row-running">${fmt(r.bal)}</div>
          <div class="row-pnl ${pnlClass}">${fmtSigned(r.currentPnl)}</div>
          <div><button class="btn danger" onclick="deleteEntry(${r.id})">✕</button></div>
        </div>`;
    }).join('');
  }

  function addEntry() {
    const type = document.getElementById('entry-type').value;
    const note = document.getElementById('entry-note').value.trim() || 'Logged Action';
    const amount = parseFloat(document.getElementById('entry-amount').value);

    if (!amount || amount <= 0) return;

    entries.push({ id: Date.now(), date: new Date().toISOString().split('T')[0], note, type, amount });
    saveData(entries);
    render();
    
    document.getElementById('entry-note').value = '';
    document.getElementById('entry-amount').value = '';
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    saveData(entries);
    render();
  }

  render();
</script>
</body>
</html>
