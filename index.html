<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --surface2: #1b1e1c;
    --border: #242724;
    --accent: #b4f068;
    --accent-dim: #7aad38;
    --red: #f06868;
    --red-dim: #a03838;
    --text: #e8ede9;
    --text-muted: #6b7a6d;
    --text-dim: #3d4a3f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: sticky;
    top: 0;
    background: rgba(13, 15, 14, 0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .header-tag {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }

  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 0;
  }

  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.green::before { background: var(--accent); }
  .card.red::before { background: var(--red); }
  .card.neutral::before { background: var(--text-muted); }

  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .card-value.green { color: var(--accent); }
  .card-value.red { color: var(--red); }
  .card-value.neutral { color: var(--text); }

  .card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 40px;
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    gap: 12px;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent-dim);
  }

  .field select option { background: var(--surface2); }

  .btn {
    background: var(--accent);
    color: #0d0f0e;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 11px 24px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    align-self: end;
  }

  .btn:hover { background: #c8ff7a; }
  .btn:active { transform: scale(0.98); }

  .btn.danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red-dim);
    padding: 6px 12px;
    font-size: 11px;
  }

  .btn.danger:hover { background: rgba(240,104,104,0.1); }

  .ledger {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .ledger-head {
    display: grid;
    grid-template-columns: 100px 1fr 110px 110px 110px 60px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .ledger-head span {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .ledger-row {
    display: grid;
    grid-template-columns: 100px 1fr 110px 110px 110px 60px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ledger-row:last-child { border-bottom: none; }
  .ledger-row:hover { background: var(--surface2); }

  .row-date { color: var(--text-muted); font-size: 12px; }
  .row-note { font-size: 13px; color: var(--text); }
  .row-tag {
    display: inline-block;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tag-deposit { background: rgba(180,240,104,0.12); color: var(--accent); }
  .tag-loss { background: rgba(240,104,104,0.12); color: var(--red); }
  .tag-initial { background: rgba(107,122,109,0.2); color: var(--text-muted); }

  .row-amount { font-size: 14px; }
  .row-amount.pos { color: var(--accent); }
  .row-amount.neg { color: var(--red); }

  .row-running { font-size: 14px; color: var(--text); font-weight: 500; }

  .row-pnl { font-size: 12px; }
  .row-pnl.pos { color: var(--accent); }
  .row-pnl.neg { color: var(--red); }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  .pnl-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 40px;
  }

  .pnl-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .pnl-bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .pnl-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .pnl-bar-fill.pos { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); }
  .pnl-bar-fill.neg { background: linear-gradient(90deg, var(--red-dim), var(--red)); }

  @media (max-width: 600px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .summary .card:last-child { grid-column: span 2; }
    .add-form { grid-template-columns: 1fr 1fr; }
    .add-form .btn { grid-column: span 2; }
    .ledger-head, .ledger-row { grid-template-columns: 80px 1fr 90px 90px 60px; }
    .ledger-head span:nth-child(4),
    .ledger-row > *:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">LEDGER<span>.io</span></div>
  <div class="header-tag">Portfolio Tracker</div>
</header>

<div class="main">

  <div class="summary" id="summary">
    <div class="card neutral">
      <div class="card-label">Original Investment</div>
      <div class="card-value neutral" id="s-original">₹0.00</div>
      <div class="card-sub">Starting capital</div>
    </div>
    <div class="card neutral">
      <div class="card-label">Current Balance</div>
      <div class="card-value neutral" id="s-current">₹0.00</div>
      <div class="card-sub">Total in portfolio</div>
    </div>
    <div class="card neutral">
      <div class="card-label">Net P&amp;L</div>
      <div class="card-value neutral" id="s-pnl">₹0.00</div>
      <div class="card-sub" id="s-pnl-pct">0.00% all time</div>
    </div>
  </div>

  <div class="pnl-bar-wrap">
    <div class="pnl-bar-label">
      <span>Portfolio Performance</span>
      <span id="bar-label">—</span>
    </div>
    <div class="pnl-bar-track">
      <div class="pnl-bar-fill pos" id="pnl-bar" style="width:50%"></div>
    </div>
  </div>

  <div class="section-title">Add Entry</div>
  <div class="add-form">
    <div class="field">
      <label>Type</label>
      <select id="entry-type">
        <option value="deposit">Deposit</option>
        <option value="loss">Loss / Withdrawal</option>
      </select>
    </div>
    <div class="field">
      <label>Note</label>
      <input type="text" id="entry-note" placeholder="e.g. Bought AAPL, Added funds…">
    </div>
    <div class="field">
      <label>Amount (₹)</label>
      <input type="number" id="entry-amount" placeholder="0.00" min="0" step="0.01">
    </div>
    <button class="btn" onclick="addEntry()">+ Add</button>
  </div>

  <div class="section-title">Transaction History</div>
  <div class="ledger">
    <div class="ledger-head">
      <span>Date</span>
      <span>Note</span>
      <span>Amount</span>
      <span>Balance</span>
      <span>P&amp;L</span>
      <span></span>
    </div>
    <div class="ledger-body" id="ledger-body">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        No transactions yet
      </div>
    </div>
  </div>

</div>

<script>
  // Changed storage key to ensure a completely fresh start
  const STORAGE_KEY = 'stock_ledger_v2';

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function initData() {
    const existing = loadData();
    if (existing) return existing;

    // Seeded with your 11.5k initial and 1500 loss
    const data = {
      original: 11500,
      entries: [
        {
          id: Date.now() - 200000,
          date: '2026-04-01', // Adjusted to early April for realism
          note: 'Initial investment',
          type: 'initial',
          amount: 11500
        },
        {
          id: Date.now() - 100000,
          date: new Date().toISOString().split('T')[0],
          note: 'Current loss',
          type: 'loss',
          amount: 1500
        }
      ]
    };
    saveData(data);
    return data;
  }

  let state = initData();

  // Swapped to Indian Numbering System and Rupee symbol
  function fmt(n) {
    return '₹' + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtSigned(n) {
    return (n >= 0 ? '+' : '-') + fmt(n);
  }

  function calcRunning() {
    let bal = 0;
    return state.entries.map(e => {
      if (e.type === 'deposit' || e.type === 'initial') bal += e.amount;
      else bal -= e.amount;
      return { ...e, running: bal };
    });
  }

  function render() {
    const rows = calcRunning();
    const current = rows.length ? rows[rows.length - 1].running : 0;
    const pnl = current - state.original;
    const pct = state.original ? (pnl / state.original * 100) : 0;

    document.getElementById('s-original').textContent = fmt(state.original);
    document.getElementById('s-current').textContent = fmt(current);

    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '-') + fmt(pnl);
    pnlEl.className = 'card-value ' + (pnl >= 0 ? 'green' : 'red');
    document.getElementById('s-pnl-pct').textContent = (pnl >= 0 ? '+' : '') + pct.toFixed(2) + '% all time';

    const barPct = Math.min(Math.abs(pct), 100);
    const bar = document.getElementById('pnl-bar');
    bar.style.width = Math.max(barPct, 2) + '%';
    bar.className = 'pnl-bar-fill ' + (pnl >= 0 ? 'pos' : 'neg');
    document.getElementById('bar-label').textContent = (pnl >= 0 ? '▲ ' : '▼ ') + Math.abs(pct).toFixed(2) + '%';

    const body = document.getElementById('ledger-body');
    if (!rows.length) {
      body.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>No transactions yet</div>';
      return;
    }

    body.innerHTML = rows.slice().reverse().map(r => {
      const rowPnl = r.running - state.original;
      const isPos = r.type === 'deposit' || r.type === 'initial';
      const tagClass = r.type === 'initial' ? 'tag-initial' : (isPos ? 'tag-deposit' : 'tag-loss');
      const tagLabel = r.type === 'initial' ? 'INITIAL' : (isPos ? 'DEPOSIT' : 'LOSS');
      const amtClass = isPos ? 'pos' : 'neg';
      const amtSign = isPos ? '+' : '-';
      const pnlClass = rowPnl >= 0 ? 'pos' : 'neg';

      return `
        <div class="ledger-row" data-id="${r.id}">
          <div class="row-date">${r.date}</div>
          <div>
            <div class="row-note">${r.note}</div>
            <span class="row-tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="row-amount ${amtClass}">${amtSign}${fmt(r.amount)}</div>
          <div class="row-running">${fmt(r.running)}</div>
          <div class="row-pnl ${pnlClass}">${fmtSigned(rowPnl)}</div>
          <div>
            ${r.type !== 'initial' ? `<button class="btn danger" onclick="deleteEntry(${r.id})">✕</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function addEntry() {
    const type = document.getElementById('entry-type').value;
    const note = document.getElementById('entry-note').value.trim();
    const amount = parseFloat(document.getElementById('entry-amount').value);

    if (!amount || amount <= 0) {
      document.getElementById('entry-amount').style.borderColor = 'var(--red)';
      setTimeout(() => document.getElementById('entry-amount').style.borderColor = '', 1000);
      return;
    }

    const entry = {
      id: Date.now(),
      date: new Date().toISOString().split('T')[0],
      note: note || (type === 'deposit' ? 'Deposit' : 'Loss / Withdrawal'),
      type,
      amount
    };

    state.entries.push(entry);
    saveData(state);
    render();

    document.getElementById('entry-note').value = '';
    document.getElementById('entry-amount').value = '';
  }

  function deleteEntry(id) {
    state.entries = state.entries.filter(e => e.id !== id);
    saveData(state);
    render();
  }

  document.getElementById('entry-amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEntry();
  });

  render();
</script>
</body>
</html>
